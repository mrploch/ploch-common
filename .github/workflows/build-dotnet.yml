# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
env:
  SONAR_PROJECT_KEY: mrploch_ploch-common
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - run: echo "The branch name is ${{ github.repository }}"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone mrploch-development (shared build config)
        run: git clone --depth 1 https://github.com/mrploch/mrploch-development.git ../mrploch-development
      - name: Copy documentation files
        run: cp ./README.md ./DocumentationSite/index.md

      # Setup Java (required for SonarScanner)
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      # Restore
      - name: Restore dependencies
        run: dotnet restore ./Ploch.Common.slnx

      # SonarCloud setup (non-blocking)
      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner
        continue-on-error: true
      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage
      - name: SonarScanner Begin
        id: sonar-begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ env.SONAR_PROJECT_KEY }}"
          /o:"${{ env.SONAR_ORGANIZATION }}"
          /d:sonar.login="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.projectBaseDir="${{ github.workspace }}"
          /d:sonar.scm.provider=git
          /d:sonar.cs.opencover.reportsPaths=**/CoverageResults/coverage.opencover.xml
          /d:sonar.coverage.exclusions="**/*.ps1,**/JetbrainsAnnotations.cs,**/*.Tests/**,**/*.Tests.csproj"
        continue-on-error: true

      # Build and Test (always runs regardless of SonarCloud status)
      - name: Build
        run: dotnet build ./Ploch.Common.slnx --no-restore
      - name: Test
        run: dotnet test ./Ploch.Common.slnx --verbosity normal --no-build --logger "trx;LogFileName=TestOutputResults.trx" /p:CollectCoverage=true /p:CoverletOutput=./CoverageResults/ "/p:CoverletOutputFormat=cobertura%2copencover"
        continue-on-error: true

      # SonarCloud end (runs even after test failures, only if begin succeeded)
      - name: SonarScanner End
        if: always() && steps.sonar-begin.outcome == 'success'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"
        continue-on-error: true

      - name: Run codacy-coverage-reporter
        if: always()
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: '**/CoverageResults/coverage.opencover.xml'
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.xml
            **/TestResults/*.trx
      - name: Test Report
        uses: phoenix-actions/test-reporting@v8
        id: test-report
        if: always()
        continue-on-error: true
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/CoverageResults/*.xml
      - name: Build documentation
        id: docfx
        if: always()
        continue-on-error: true
        run: dotnet tool update -g docfx && docfx DocumentationSite/docfx.json
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master' && steps.docfx.outcome == 'success'
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./DocumentationSite/_site
      # Publish prerelease NuGet packages to GitHub Packages
      # Release packages are published to nuget.org via the release workflow
      - name: Add GitHub Packages source
        if: always()
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: dotnet nuget add source --username kploch --password "$GH_PACKAGES_TOKEN" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/mrploch/index.json"
      - name: Publish NuGet packages to GitHub Packages
        if: always()
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          dotnet nuget push ./**/*.nupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN"
          dotnet nuget push ./**/*.snupkg --source github --skip-duplicate -k "$GH_PACKAGES_TOKEN" || true
