# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
env:
  SONAR_PROJECT_KEY: mrploch_ploch-common
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - run: echo "The branch name is ${{ github.repository }}"
      - uses: actions/checkout@v4
      - name: Clone mrploch-development (shared build config)
        run: git clone --depth 1 https://github.com/mrploch/mrploch-development.git ../mrploch-development
      - name: Copy documentation files
        run: cp ./README.md ./DocumentationSite/index.md

      # Setup Java (required for SonarScanner)
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: |
            9.0.x
            6.0.x

      # Restore
      - name: Restore dependencies
        run: dotnet restore ./Ploch.Common.slnx

      # SonarCloud setup (non-blocking)
      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner
        continue-on-error: true
      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage
      - name: SonarScanner Begin
        id: sonar-begin
        run: dotnet sonarscanner begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_ORGANIZATION }}" /d:sonar.login="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths=**/CoverageResults/coverage.opencover.xml /d:sonar.host.url="https://sonarcloud.io"
        continue-on-error: true

      # Build and Test (always runs regardless of SonarCloud status)
      - name: Build
        run: dotnet build ./Ploch.Common.slnx --no-restore
      - name: Test
        run: dotnet test ./Ploch.Common.slnx --verbosity normal --no-build --logger "trx;LogFileName=TestOutputResults.trx" /p:CollectCoverage=true /p:CoverletOutput=./CoverageResults/ "/p:CoverletOutputFormat=cobertura%2copencover"
        continue-on-error: true

      # SonarCloud end (runs even after test failures, only if begin succeeded)
      - name: SonarScanner End
        if: always() && steps.sonar-begin.outcome == 'success'
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
        continue-on-error: true

      - name: Run codacy-coverage-reporter
        if: always()
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: '**/CoverageResults/coverage.opencover.xml'
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.xml
            **/TestResults/*.trx
      - name: Test Report
        uses: phoenix-actions/test-reporting@v8
        id: test-report
        if: always()
        continue-on-error: true
        with:
          name: DotNet Tests
          path: '**/*.trx'
          reporter: dotnet-trx
      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: |
            **/CoverageResults/*.xml
      - name: Build documentation
        id: docfx
        if: always()
        continue-on-error: true
        run: dotnet tool update -g docfx && docfx DocumentationSite/docfx.json
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/master' && steps.docfx.outcome == 'success'
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./DocumentationSite/_site
      # Publish all NuGet packages to NuGet.org
      # Use --skip-duplicate to prevent errors if a package with the same version already exists.
      # If you retry a failed workflow, already published packages will be skipped without error.
      - name: Add GitHub Packages source
        if: always()
        run: dotnet nuget add source --username kploch --password ${{secrets.GH_PACKAGES_TOKEN}} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/mrploch/index.json"
      - name: Options for publishing of NuGet packages
        if: always()
        run: echo "dotnet nuget push **/*.nupkg --source github -k ${{secrets.GH_PACKAGES_TOKEN}}"
      - name: Publish NuGet package
        if: always()
        run: dotnet nuget push **/*.nupkg --source github -k ${{secrets.GH_PACKAGES_TOKEN}}
