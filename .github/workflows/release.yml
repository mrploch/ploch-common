name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release (e.g. 3.0, 2.1). The patch version is computed automatically by NBGV.'
        required: true
        type: string
      next_version:
        description: 'Next development version after release (e.g. 3.1). Leave empty to auto-increment the minor version.'
        required: false
        type: string

env:
  DOTNET_VERSION: '9.0.x'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.release_version }}"
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Version must be in major.minor format (e.g. 3.0) without leading zeros"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Clone mrploch-development (shared build config)
        run: git clone --depth 1 https://github.com/mrploch/mrploch-development.git ../mrploch-development

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install NBGV tool
        run: dotnet tool restore

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          dotnet nbgv set-version ${{ inputs.release_version }}
          echo "Release version set to ${{ inputs.release_version }}"

      - name: Commit release version
        run: |
          git add version.json
          git commit -m "chore(release): Set version to ${{ inputs.release_version }}"

      - name: Get computed NuGet version
        id: version
        run: |
          NUGET_VERSION=$(dotnet nbgv get-version --variable NuGetPackageVersion)
          echo "nuget_version=$NUGET_VERSION" >> $GITHUB_OUTPUT
          echo "NuGet package version: $NUGET_VERSION"

      - name: Restore dependencies
        run: dotnet restore ./Ploch.Common.slnx

      - name: Build (Release)
        run: dotnet build ./Ploch.Common.slnx --no-restore -c Release

      - name: Test
        run: dotnet test ./Ploch.Common.slnx --no-build -c Release --verbosity normal --logger "trx;LogFileName=TestOutputResults.trx" /p:CollectCoverage=true /p:CoverletOutput=./CoverageResults/ "/p:CoverletOutputFormat=cobertura%2copencover"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: |
            **/TestResults/*.xml
            **/TestResults/*.trx

      # Create tag BEFORE publishing packages to avoid orphaned packages on nuget.org
      - name: Create and push tag
        id: tag
        if: success()
        run: |
          TAG="v${{ steps.version.outputs.nuget_version }}"
          git tag -a "$TAG" -m "Release ${{ steps.version.outputs.nuget_version }}"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish NuGet packages to nuget.org
        if: success()
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          find . -name '*.nupkg' -not -path '*/test*' | while read pkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --skip-duplicate -k "$NUGET_API_KEY"
          done

      - name: Publish symbol packages to nuget.org
        if: success()
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          find . -name '*.snupkg' | while read pkg; do
            echo "Publishing symbols $pkg"
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --skip-duplicate -k "$NUGET_API_KEY" || true
          done

      - name: Compute next development version
        id: next
        if: success()
        run: |
          NEXT="${{ inputs.next_version }}"
          if [ -z "$NEXT" ]; then
            MAJOR=$(echo "${{ inputs.release_version }}" | cut -d. -f1)
            MINOR=$(echo "${{ inputs.release_version }}" | cut -d. -f2)
            NEXT="$MAJOR.$((MINOR + 1))"
          fi
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          echo "Next development version: $NEXT-prerelease"

      - name: Set next development version
        if: success()
        run: |
          dotnet nbgv set-version "${{ steps.next.outputs.next_version }}-prerelease"

      - name: Archive consumed change-log entries
        if: success()
        run: |
          if [ -d "change-log" ] && [ "$(ls -A change-log/*.md 2>/dev/null)" ]; then
            mkdir -p change-log/archive
            mv change-log/*.md change-log/archive/ 2>/dev/null || true
          fi

      - name: Commit and push next development version
        if: success()
        run: |
          git add version.json
          git add change-log/ || true
          git commit -m "chore(release): Bump version to ${{ steps.next.outputs.next_version }}-prerelease for development"
          git push origin master

      - name: Generate release notes
        id: release-notes
        if: success()
        run: |
          NOTES=""
          if [ -d "change-log/archive" ] && [ "$(ls -A change-log/archive/*.md 2>/dev/null)" ]; then
            NOTES=$(cat change-log/archive/*.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.nuget_version }}"
          fi
          # Write to file for the GitHub Release body
          cat > /tmp/release-notes.md <<ENDOFNOTES
          $NOTES

          ---

          ## NuGet Packages

          All packages are available on [nuget.org](https://www.nuget.org/profiles/mrploch) with version \`${{ steps.version.outputs.nuget_version }}\`.

          Install via:
          \`\`\`bash
          dotnet add package Ploch.Common --version ${{ steps.version.outputs.nuget_version }}
          \`\`\`
          ENDOFNOTES

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.version.outputs.nuget_version }}"
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
